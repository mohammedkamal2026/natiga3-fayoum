<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>نتيجة الشهادة الإعدادية - محافظة الفيوم</title>

    <link rel="icon" href="assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <img src="assets/logo.png" class="logo" alt="شعار محافظة الفيوم">

        <h1>نتيجة الشهادة الإعدادية</h1>

        <h2>محافظة الفيوم</h2>

        <p class="year">
            الفصل الدراسي الأول 2025 / 2026
        </p>

    </header>


    <!-- Search -->

    <section class="search-box">

        <h3>الاستعلام برقم الجلوس</h3>

        <input
            type="number"
            id="seatNumber"
            placeholder="أدخل رقم الجلوس">

        <button id="searchBtn">

            استعلام

        </button>

    </section>


    <!-- Loading -->

    <div id="loading" class="loading">

        جاري البحث...

    </div>


    <!-- Result -->

    <section id="resultCard" class="result-card">

    </section>


</div>


<footer>

    جميع الحقوق محفوظة © 2026

    <br>

    تصميم وتطوير

    <strong>

        محمد كمال

    </strong>

</footer>


<script src="script.js"></script>

</body>

</html>
